services:
  postgres:
    image: postgres:16-alpine
    container_name: pinepilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinepilot
      POSTGRES_PASSWORD: pinepilot
      POSTGRES_DB: pinepilot
    ports:
      - "5432:5432"
    volumes:
      - pinepilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinepilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pinepilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pinepilot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pinepilot_pg_data:
  pinepilot_redis_data:
